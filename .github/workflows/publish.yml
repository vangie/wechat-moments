name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Run ruff check
        run: uv run ruff check src/ tests/

      - name: Run tests
        run: uv run pytest tests/unit tests/fsm -q --tb=short

  publish:
    runs-on: ubuntu-latest
    needs: test
    environment: pypi
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish --token ${{ secrets.PYPI_TOKEN }}

  release:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog from $PREV_TAG to $GITHUB_REF_NAME"
            NOTES=$(git log --pretty=format:"- %s" $PREV_TAG..$GITHUB_REF_NAME)
          else
            echo "First release, using all commits"
            NOTES=$(git log --pretty=format:"- %s")
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body: |
            ## What's Changed
            
            ${{ steps.notes.outputs.NOTES }}
            
            ## Installation
            
            ```bash
            # pip
            pip install wechat-moments==${{ steps.version.outputs.VERSION }}
            
            # pipx
            pipx install wechat-moments==${{ steps.version.outputs.VERSION }}
            
            # Homebrew
            brew tap vangie/formula
            brew install wechat-moments
            ```
          generate_release_notes: false

  update-homebrew:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Wait for PyPI to be available
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          echo "Waiting for wechat-moments==${VERSION} on PyPI..."
          for i in {1..30}; do
            if curl -s "https://pypi.org/pypi/wechat-moments/${VERSION}/json" | grep -q '"version"'; then
              echo "Package available on PyPI"
              exit 0
            fi
            echo "Attempt $i: Package not yet available, waiting 10s..."
            sleep 10
          done
          echo "Timeout waiting for PyPI"
          exit 1

      - name: Get PyPI package info
        id: pypi
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          PYPI_JSON=$(curl -s "https://pypi.org/pypi/wechat-moments/${VERSION}/json")
          URL=$(echo "$PYPI_JSON" | jq -r '.urls[] | select(.packagetype == "sdist") | .url')
          SHA256=$(echo "$PYPI_JSON" | jq -r '.urls[] | select(.packagetype == "sdist") | .digests.sha256')
          echo "URL=${URL}" >> $GITHUB_OUTPUT
          echo "SHA256=${SHA256}" >> $GITHUB_OUTPUT

      - name: Checkout homebrew-formula
        uses: actions/checkout@v6
        with:
          repository: vangie/homebrew-formula
          token: ${{ secrets.HOMEBREW_FORMULA_TOKEN }}
          path: homebrew-formula

      - name: Update formula
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          URL=${{ steps.pypi.outputs.URL }}
          SHA256=${{ steps.pypi.outputs.SHA256 }}
          
          cd homebrew-formula
          sed -i "s/version \".*\"/version \"${VERSION}\"/" wechat-moments.rb
          sed -i "s|url \".*\"|url \"${URL}\"|" wechat-moments.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" wechat-moments.rb

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          path: homebrew-formula
          token: ${{ secrets.HOMEBREW_FORMULA_TOKEN }}
          commit-message: "Update wechat-moments to ${{ steps.version.outputs.VERSION }}"
          title: "Update wechat-moments to ${{ steps.version.outputs.VERSION }}"
          body: |
            Automated update triggered by [wechat-moments ${{ steps.version.outputs.VERSION }}](https://github.com/vangie/wechat-moments/releases/tag/v${{ steps.version.outputs.VERSION }})
            
            - Version: `${{ steps.version.outputs.VERSION }}`
            - SHA256: `${{ steps.pypi.outputs.SHA256 }}`
          branch: update-wechat-moments-${{ steps.version.outputs.VERSION }}
          base: master
