name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Run ruff check
        run: uv run ruff check src/ tests/

      - name: Run tests
        run: uv run pytest tests/unit tests/fsm -q --tb=short

  publish:
    runs-on: ubuntu-latest
    needs: test
    environment: pypi
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish --token ${{ secrets.PYPI_TOKEN }}

  release:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog from $PREV_TAG to $GITHUB_REF_NAME"
            NOTES=$(git log --pretty=format:"- %s" $PREV_TAG..$GITHUB_REF_NAME)
          else
            echo "First release, using all commits"
            NOTES=$(git log --pretty=format:"- %s")
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body: |
            ## What's Changed
            
            ${{ steps.notes.outputs.NOTES }}
            
            ## Installation
            
            ```bash
            # pip
            pip install wechat-moments==${{ steps.version.outputs.VERSION }}
            
            # pipx
            pipx install wechat-moments==${{ steps.version.outputs.VERSION }}
            
            # Homebrew
            brew tap vangie/formula
            brew install wechat-moments
            ```
          generate_release_notes: false

  trigger-homebrew-update:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Wait for PyPI to be available
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          echo "Waiting for wechat-moments==${VERSION} on PyPI..."
          for i in {1..30}; do
            if curl -s "https://pypi.org/pypi/wechat-moments/${VERSION}/json" | grep -q '"version"'; then
              echo "Package available on PyPI"
              exit 0
            fi
            echo "Attempt $i: Package not yet available, waiting 10s..."
            sleep 10
          done
          echo "Timeout waiting for PyPI"
          exit 1

      - name: Trigger homebrew-formula update
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.HOMEBREW_FORMULA_TOKEN }}" \
            https://api.github.com/repos/vangie/homebrew-formula/actions/workflows/auto-update-wechat-moments.yml/dispatches \
            -d '{"ref":"master","inputs":{"version":"${{ steps.version.outputs.VERSION }}"}}'
          echo "Triggered homebrew-formula update workflow"
